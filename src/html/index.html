<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Switching tabs</title>
</head>
<body>
    <div class="tabs-container">
    <div class="tabs">
      <div class="tab active" data-tab="first">First Tab</div>
      <div class="tab" data-tab="second">Second Tab</div>
      <div class="tab" data-tab="third">Third Tab</div>
      <div class="tab" data-tab="fourth">Fourth Tab</div>
    </div>

    <div id="first" class="tab-content active">
      First Tab content to be displayed here.
    </div>

    <div id="second" class="tab-content">
      Second Tab content to be displayed here.
    </div>

    <div id="third" class="tab-content">
      Third Tab content to be displayed here.
    </div>

    <div id="fourth" class="tab-content">
      Fourth Tab content to be displayed here.
    </div>

  </div>

</body>
</html>
